<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <style>
    body { font-family: Arial; max-width: 420px; margin: 40px auto; }
    input { width: 100%; padding: 10px; margin: 8px 0; }
    button { padding: 10px 14px; cursor: pointer; }
    .box { border:1px solid #ddd; padding:16px; border-radius:10px; }
  </style>
</head>
<body>
  <div class="box">
    <h2>Kirish</h2>

    {% if form.errors %}
      <p style="color:red;">Login yoki parol xato.</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <label>Login</label>
      {{ form.username }}
      <label>Parol</label>
      {{ form.password }}
      <button type="submit">Kirish</button>
    </form>
  </div>
</body>
</html>
